# Prometheus configuration for ADP observability
#
# Scrapes the /metrics endpoint from the ADP demo runner.
# In production, this would be your platform's metrics endpoint.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "adp-paths"
    static_configs:
      # Docker: use host.docker.internal to reach the host machine
      # Homebrew/local: use localhost directly
      - targets: ["localhost:8080"]
        labels:
          service: "adp-paths"
          environment: "demo"
